# DirecT relay API — https://fly.io/docs
# GitHub: https://github.com/MorninRage/DirecT — deploy from relay/:  fly deploy
#
# Persisted on volume (/data): relay-state.json, events-state.json, rewards-epochs.json, media/
# If this app name is taken globally, pick another and update netlify.toml VITE_RELAY_URL.
#
# Secrets (set via fly secrets set — never commit):
#   CHAIN_ID=84532
#   INDEXER_SECRET=<random>  — gates GET /v1/indexer/snapshot, POST /v1/admin/rewards-epochs, etc.
#
# Docs: docs/deploy/online.md, docs/deploy/current-environment.md

app = "morninrage-direct-relay"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DATA_DIR = "/data"

[[mounts]]
  source = "morninrage_direct_relay_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "45s"
  method = "GET"
  path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
