# Netlify: DirecT web (Vite SPA under apps/web)
# GitHub: https://github.com/MorninRage/DirecT — connect repo in Netlify for CI/CD (branch main).
# GitHub Actions: .github/workflows/ci.yml (relay + web + contracts on push/PR).
# Further setup: docs/deploy/online.md and .github/README.md
#
# CLI-linked site (this folder): https://direct-social.netlify.app
#   Dashboard: https://app.netlify.com/projects/direct-social
#
# Relay (Fly) for production API:
#   https://morninrage-direct-relay.fly.dev  (see relay/fly.toml — set Fly secrets, do not commit)
#
# Build env: values here are baked into the Vite build. Netlify UI env vars override/extend these per branch.
#   Committed below: relay URL + chain + public RPC (sanity default for Git-linked builds).
#   Not committed (set in Netlify UI or via `npm run netlify:sync-token --prefix contracts`): contract addresses.
#   VITE_RELAY_URL, VITE_CHAIN_ID, VITE_RPC_URL — required for any build
#   VITE_TOKEN_ADDRESS, VITE_EMISSIONS_ADDRESS — required for DIR balance in Wallet + /claim (sync after deploy)
#
# Deploy sync: when Fly app name or relay URL changes, update root netlify.toml, docs/deploy/current-environment.md,
# README.md, and comments in relay/fly.toml (see .github/README.md checklist).
#
# After deploying contracts (`contracts/scripts/deploy.ts`), run netlify:sync-token or ship:online, then redeploy web.

# Build from repo root so CLI + Netlify Git resolve the same publish folder (apps/web/dist).
[build]
  command = "npm ci --prefix apps/web && npm run build --prefix apps/web"
  publish = "apps/web/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
  VITE_RELAY_URL = "https://morninrage-direct-relay.fly.dev"
  VITE_CHAIN_ID = "84532"
  VITE_RPC_URL = "https://sepolia.base.org"
