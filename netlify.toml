# Netlify: DirecT web (Vite SPA under apps/web)
# GitHub: https://github.com/MorninRage/DirecT — link this repo in Netlify for CI (branch main).
#
# CLI-linked site (this folder): https://direct-social.netlify.app
#   Dashboard: https://app.netlify.com/projects/direct-social
#
# Relay (Fly) for production API:
#   https://morninrage-direct-relay.fly.dev
#
# After deploying contracts to Base Sepolia (`contracts/scripts/deploy.ts`), add in
# Netlify → Site configuration → Environment variables → Build (overrides below if needed):
#   VITE_TOKEN_ADDRESS=<DirecTToken 0x address>
#   VITE_EMISSIONS_ADDRESS=<EmissionsController 0x address>
# Then trigger a new deploy so Vite bakes them into the bundle.

[build]
  base = "apps/web"
  command = "npm run build"
  publish = "apps/web/dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
  VITE_RELAY_URL = "https://morninrage-direct-relay.fly.dev"
  VITE_CHAIN_ID = "84532"
  VITE_RPC_URL = "https://sepolia.base.org"
