# Netlify: DirecT web (Vite SPA under apps/web)
# GitHub: https://github.com/MorninRage/DirecT — link this repo in Netlify for CI (branch main).
#
# CLI-linked site (this folder): https://direct-social.netlify.app
#   Dashboard: https://app.netlify.com/projects/direct-social
# If you use a different site slug, run: netlify link
#
# Relay (Fly) for production API:
#   https://morninrage-direct-relay.fly.dev
#
# Optional overrides in the UI: VITE_TOKEN_ADDRESS, VITE_EMISSIONS_ADDRESS

[build]
  base = "apps/web"
  command = "npm run build"
  # Publish path is relative to repo root (not `base`). Output is apps/web/dist after Vite build.
  publish = "apps/web/dist"

# Single-page app: send all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "22"
  VITE_RELAY_URL = "https://morninrage-direct-relay.fly.dev"
  VITE_CHAIN_ID = "84532"
  VITE_RPC_URL = "https://sepolia.base.org"
